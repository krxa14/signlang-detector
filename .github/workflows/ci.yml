name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Smoke imports
        run: |
          python -c "import sys; sys.path.insert(0,'.'); from api.main import app; print('app ok')"
      - name: Run tests
        run: |
          # tests don't need the dataset or trained weights
          pytest -q tests/test_pipeline.py tests/test_api.py -k "not predict_blank" || pytest -q tests/test_pipeline.py
